<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Combat Creators — Hook Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000000;
      --white: #ffffff;
      --gray-1: #111111;
      --gray-2: #1a1a1a;
      --gray-3: #2a2a2a;
      --gray-4: #444444;
      --gray-5: #666666;
      --gray-6: #888888;
      --gray-7: #aaaaaa;
      --green: #4caf50;
      --red: #e57373;
    }

    html, body {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 2rem;
      border-bottom: 0.5px solid #222;
    }

    .logo { width: 64px; height: 64px; object-fit: contain; margin-bottom: 1rem; }

    .brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 0.12em;
      color: var(--white);
      line-height: 1;
    }

    .tagline {
      font-size: 0.8rem;
      color: var(--gray-6);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    .input-label {
      font-size: 0.75rem;
      color: var(--gray-6);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: block;
    }

    textarea {
      width: 100%;
      background: var(--gray-1);
      color: var(--white);
      border: 0.5px solid #333;
      border-radius: 12px;
      padding: 16px;
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.7;
      resize: vertical;
      min-height: 180px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #555; }
    textarea::placeholder { color: var(--gray-5); }

    .generate-btn {
      width: 100%;
      margin-top: 1rem;
      padding: 16px;
      background: var(--white);
      color: var(--black);
      border: 2px solid var(--white);
      border-radius: 12px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .generate-btn:hover { background: #e8e8e8; }
    .generate-btn:active { transform: scale(0.99); }
    .generate-btn:disabled {
      background: var(--gray-3);
      color: var(--gray-5);
      border-color: var(--gray-3);
      cursor: not-allowed;
      transform: none;
    }

    .status {
      text-align: center;
      font-size: 0.82rem;
      color: var(--gray-6);
      margin-top: 1rem;
      min-height: 20px;
    }

    .error-msg {
      text-align: center;
      font-size: 0.82rem;
      color: var(--red);
      margin-top: 0.5rem;
    }

    .clarify-wrap {
      background: var(--gray-1);
      border: 0.5px solid #333;
      border-radius: 14px;
      padding: 1.5rem;
      margin-top: 2rem;
    }

    .clarify-heading {
      font-size: 0.9rem;
      color: var(--white);
      font-weight: 500;
      margin-bottom: 1.25rem;
      line-height: 1.5;
    }

    .clarify-q {
      font-size: 0.8rem;
      color: var(--gray-6);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .clarify-input {
      width: 100%;
      background: var(--black);
      color: var(--white);
      border: 0.5px solid #333;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      margin-bottom: 1.25rem;
      transition: border-color 0.2s;
    }

    .clarify-input:focus { border-color: #555; }

    .clarify-btn {
      background: var(--white);
      color: var(--black);
      border: 2px solid var(--white);
      border-radius: 8px;
      padding: 11px 24px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.15s;
    }

    .clarify-btn:hover { background: #e8e8e8; }

    .hooks-header {
      font-size: 0.72rem;
      color: var(--gray-5);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }

    .hook-card {
      background: var(--gray-1);
      border: 0.5px solid #2a2a2a;
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hook-card:nth-child(2) { animation-delay: 0.05s; }
    .hook-card:nth-child(3) { animation-delay: 0.10s; }
    .hook-card:nth-child(4) { animation-delay: 0.15s; }
    .hook-card:nth-child(5) { animation-delay: 0.20s; }

    .hook-num {
      font-size: 0.68rem;
      color: var(--gray-5);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .hook-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.9rem;
      letter-spacing: 0.06em;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 1.25rem;
    }

    .hook-meta {
      border-top: 0.5px solid #222;
      padding-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .meta-row { display: flex; gap: 12px; align-items: flex-start; }

    .meta-label {
      font-size: 0.65rem;
      color: var(--gray-5);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      min-width: 54px;
      padding-top: 2px;
      flex-shrink: 0;
    }

    .meta-value {
      font-size: 0.85rem;
      color: var(--gray-7);
      line-height: 1.6;
      font-weight: 300;
    }

    .copy-btn {
      margin-top: 1.25rem;
      width: 100%;
      background: var(--gray-2);
      color: var(--white);
      border: 0.5px solid var(--gray-4);
      border-radius: 8px;
      padding: 10px;
      font-size: 0.82rem;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .copy-btn:hover { background: var(--gray-3); border-color: var(--gray-6); }
    .copy-btn.copied { color: var(--green); border-color: var(--green); background: #0d1f0d; }

    .reset-btn {
      display: block;
      margin: 2rem auto 0;
      background: transparent;
      color: var(--gray-6);
      border: 0.5px solid var(--gray-4);
      border-radius: 8px;
      padding: 10px 28px;
      font-size: 0.82rem;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .reset-btn:hover { color: var(--white); border-color: var(--gray-6); }

    footer {
      text-align: center;
      padding: 2rem 1.5rem;
      border-top: 0.5px solid #1a1a1a;
      font-size: 0.72rem;
      color: var(--gray-5);
      letter-spacing: 0.1em;
    }

    @media (max-width: 480px) {
      .brand { font-size: 1.8rem; }
      .hook-text { font-size: 1.5rem; }
      main { padding: 2rem 1rem 3rem; }
    }
  </style>
</head>
<body>

  <header>
    <img src="/logo.png" alt="Combat Creators" class="logo" onerror="this.style.display='none'" />
    <div class="brand">Combat Creators</div>
    <div class="tagline">On-Screen Text Hook Generator</div>
  </header>

  <main>
    <div id="input-section">
      <label class="input-label">Paste your script or describe your video idea</label>
      <textarea id="user-input" placeholder="Paste your full video script here... or describe your idea (e.g. 'a video about why most creators fail at growing on Instagram')"></textarea>
      <button class="generate-btn" id="generate-btn" onclick="handleGenerate()">Generate My Hooks</button>
      <div class="status" id="status"></div>
      <div class="error-msg" id="error"></div>
    </div>

    <div id="clarify-section" style="display:none;"></div>
    <div id="hooks-section" style="display:none;"></div>
  </main>

  <footer>&copy; Combat Creators &mdash; Powered by AI</footer>

  <script>
    let conversationHistory = [];

    function setStatus(msg) { document.getElementById('status').textContent = msg; }
    function setError(msg) { document.getElementById('error').textContent = msg; }
    function clearMessages() { setStatus(''); setError(''); }

    async function callAPI(messages) {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: 'Server error ' + res.status }));
        throw new Error(err.error || 'Error ' + res.status);
      }
      return await res.json();
    }

    async function handleGenerate() {
      const input = document.getElementById('user-input').value.trim();
      if (!input) { setError('Please paste your script or describe your video idea.'); return; }
      clearMessages();

      const btn = document.getElementById('generate-btn');
      btn.disabled = true;
      btn.textContent = 'Generating...';
      setStatus('Analyzing your content...');

      conversationHistory = [{ role: 'user', content: input }];

      try {
        const result = await callAPI(conversationHistory);
        conversationHistory.push({ role: 'assistant', content: JSON.stringify(result) });
        if (result.type === 'clarify') renderClarify(result);
        else if (result.type === 'hooks') renderHooks(result.hooks);
        setStatus('');
      } catch(e) {
        setError('Something went wrong: ' + e.message);
        setStatus('');
      }

      btn.disabled = false;
      btn.textContent = 'Generate My Hooks';
    }

    async function handleClarifySubmit() {
      const inputs = document.querySelectorAll('.clarify-input');
      let answers = [];
      inputs.forEach(inp => {
        if (inp.value.trim()) answers.push('Q: ' + inp.getAttribute('data-q') + '\nA: ' + inp.value.trim());
      });
      if (!answers.length) return;

      conversationHistory.push({ role: 'user', content: answers.join('\n\n') });
      document.getElementById('clarify-section').innerHTML = '';
      clearMessages();
      setStatus('Generating your hooks...');

      try {
        const result = await callAPI(conversationHistory);
        if (result.type === 'hooks') renderHooks(result.hooks);
        setStatus('');
      } catch(e) {
        setError('Something went wrong: ' + e.message);
        setStatus('');
      }
    }

    function renderClarify(result) {
      const sec = document.getElementById('clarify-section');
      sec.style.display = 'block';
      let html = '<div class="clarify-wrap"><div class="clarify-heading">' + result.message + '</div>';
      (result.questions || []).forEach((q, i) => {
        const safeQ = q.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        html += '<div class="clarify-q">' + (i + 1) + '. ' + q + '</div>';
        html += '<input class="clarify-input" data-q="' + safeQ + '" type="text" placeholder="Your answer..." />';
      });
      html += '<button class="clarify-btn" onclick="handleClarifySubmit()">Generate My Hooks</button></div>';
      sec.innerHTML = html;
    }

    function renderHooks(hooks) {
      const sec = document.getElementById('hooks-section');
      sec.style.display = 'block';
      document.getElementById('clarify-section').style.display = 'none';
      document.getElementById('input-section').style.display = 'none';

      let html = '<div class="hooks-header">Your On-Screen Text Hooks</div>';
      (hooks || []).forEach((hook, i) => {
        const safeText = (hook.text || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        html += '<div class="hook-card">';
        html += '<div class="hook-num">Hook ' + (i + 1) + ' of ' + hooks.length + '</div>';
        html += '<div class="hook-text">' + (hook.text || '') + '</div>';
        html += '<div class="hook-meta">';
        html += '<div class="meta-row"><span class="meta-label">Why</span><span class="meta-value">' + (hook.why || '') + '</span></div>';
        html += '<div class="meta-row"><span class="meta-label">Format</span><span class="meta-value">' + (hook.formatting || '') + '</span></div>';
        html += '</div>';
        html += '<button class="copy-btn" onclick="copyHook(this, \'' + safeText + '\')">Copy Hook</button>';
        html += '</div>';
      });

      html += '<button class="reset-btn" onclick="resetApp()">Generate New Hooks</button>';
      sec.innerHTML = html;
    }

    function copyHook(btn, text) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy Hook'; btn.classList.remove('copied'); }, 2000);
      });
    }

    function resetApp() {
      conversationHistory = [];
      document.getElementById('user-input').value = '';
      document.getElementById('input-section').style.display = 'block';
      document.getElementById('hooks-section').style.display = 'none';
      document.getElementById('clarify-section').style.display = 'none';
      clearMessages();
    }
  </script>

</body>
</html>
